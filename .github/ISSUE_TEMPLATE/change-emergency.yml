name: "🚨 Change (Emergency)"
description: "Unplanned change that must happen now."
labels: ["change", "change-emergency", "Critical"]
body:
  - type: markdown
    attributes:
      value: |
        **Emergency Change:** Unplanned, must happen now. Auto-labeled Critical.

        Workflow: `In Progress` > `Closed`
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Palo Alto
        - Illumio
        - Cloud Network Security
        - IaC & Automation
        - Governance & Compliance
        - Training & Enablement
        - General Operations
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Non-Prod
        - Prod
    validations:
      required: true
  - type: input
    id: servicenow_chg
    attributes:
      label: ServiceNow Change ID
  - type: textarea
    id: description
    attributes:
      label: What's happening and why is it urgent?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact if not executed
    validations:
      required: true
