name: "🏁 Milestone"
description: "Zero-effort delivery checkpoint for leadership visibility."
labels: ["milestone"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone:** Zero-effort delivery checkpoint that gives leadership and PMs phase visibility without reading every underlying ticket.

        Workflow: `Open` > `Achieved`

        Link this to the parent Feature/Project and related issues.
  - type: input
    id: summary
    attributes:
      label: Milestone Name
    validations:
      required: true
  - type: input
    id: target_date
    attributes:
      label: Target Date
      description: YYYY-MM-DD
  - type: textarea
    id: criteria
    attributes:
      label: Achievement Criteria
      description: What must be true for this milestone to be marked Achieved?
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: linked_issues
    attributes:
      label: Related Issues
      description: Link the issues that must be completed for this milestone.
